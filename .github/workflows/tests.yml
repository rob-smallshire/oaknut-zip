name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Run tests (macOS)
        if: runner.os == 'macOS'
        run: uv run --python 3.13 --with pytest --with xattr pytest tests/ -v

      - name: Run tests (Linux/Windows)
        if: runner.os != 'macOS'
        run: uv run --python 3.13 --with pytest pytest tests/ -v

  readme-check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Check README is up-to-date
        run: uv run scripts/generate_readme.py --check
